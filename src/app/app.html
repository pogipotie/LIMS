<ng-container *ngIf="isLoggedIn; else loginTemplate">
  <app-navbar (toggleSidebar)="toggleSidebar(sidenav)"></app-navbar>
  <mat-sidenav-container class="sidenav-container" autosize>
    <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav" [class.collapsed]="!isMobile && sidebarCollapsed">
      <app-sidebar [isCollapsed]="!isMobile && sidebarCollapsed" (navClick)="isMobile && sidenav.close()"></app-sidebar>
    </mat-sidenav>
    <mat-sidenav-content class="content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</ng-container>

<ng-template #loginTemplate>
  <router-outlet></router-outlet>
</ng-template>
